server:
  port: 60000 #Spring Cloud - Eureka 기본 서버포트

eureka:
  instance:
    hostname: localhost
    #hostname: localhost
    #prefer-ip-address: true
    instance-id: ${spring.application.name}
  client:
    register-with-eureka: true #Cluster 환경에서 본인의 서버 주소를 default 도메인의 다른 서버에 본인의 주소를 알림, 단일 서버에서는 false
    fetch-registry: true #메모리에 올려진 레지스트리 목록을 주기적으로 갱신, 클러스터 환경일 경우 true 필요
    service-url:
      defaultZone: http://127.0.0.1:8761/eureka

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/users #cloud-native-msa-user-mysql
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: '{cipher}c8585bb673a7174ec09100d127dc747a2e2e4940428462ff53b1a10231113df4' # root
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    open-in-view: false
    show-sql: true #SQL 실행문 로그로 기록
    properties:
      hibernate:
        format_sql: true #pretty format
        highlight_sql : true #colored
  data:
#    mongodb:
#      database: cyberops
#    redis:
#      host: localhost
#      port: 6379

# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      ORDER_OF_ONE_USER:
        slidingWindowSize: 5 # 5mot
        slidingWindowType: COUNT_BASED # sliding window type
        failureRateThreshold: 10 # 10%
        waitDurationInOpenState: 1s # open for 1s
        permittedNumberOfCallsInHalfOpenState: 3 #Open > Half open일때 테스트 요청 개수
  bulkhead:
    instances:
      ORDER_OF_ONE_USER:
        maxConcurrentCalls: 5 # bulkhead slots
        maxWaitDuration: 0 # bulkhead fail fast

# No TimeLimiter

# 환경변수
external:
  order-service:
    base-url: http://ORDER-SERVICE   # http://localhost:60000
    read-order-of-user-url: http://ORDER-SERVICE/orders/%s # http://localhost:60000

# 로깅 레벨
logging:
  level:
    org.springframework.batch.item.database: DEBUG
    com.msa.user.config.order: DEBUG

# etc
greeting:
  message: Welcome to User Micro Service.